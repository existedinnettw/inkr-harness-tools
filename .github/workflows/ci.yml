name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Run unit tests (python)
        run: |
          uv sync --dev
          uv run pytest
