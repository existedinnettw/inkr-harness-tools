name: Preview

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup toolchain
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build preview artifact (python)
        run: |
          uv sync --dev
          uv build
      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: preview-${{ github.sha }}
          path: |
            dist
            build
            target
          if-no-files-found: ignore
